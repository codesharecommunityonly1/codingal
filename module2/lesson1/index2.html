<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>list</title>
</head>
<body>
    <h2>An ordered HTML list:</h2>
    <ol>
        <li>First item</li>
        <li>Second item</li>
        <li>Third item</li>
        <li>Fourth item</li>
    </ol>
    <h2>An unordered list:</h2>
    <ul>
        <li>Item</li>
        <li>Item</li>
        <li>Item</li>
        <li>Item</li>
    </ul>
    <h2>Definition list:</h2>
    <dl>
        <dt>Tea</dt>
        <dd>- hot drink</dd>
        <dt>Juice</dt>
        <dd>- ice drink</dd>
    </dl>
</body>
</html>
